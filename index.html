<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>車両位置トラッカー</title>
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
    background: #f2f4f7;
    color: #1a1a1a;
    padding-bottom: 90px; /* 固定送信ボタン分の余白 */
  }
  header {
    background: #1d4ed8;
    color: #fff;
    padding: 14px 16px;
    font-size: 18px;
    font-weight: 600;
    text-align: center;
  }
  main {
    max-width: 480px;
    margin: 0 auto;
    padding: 16px;
  }
  .card {
    background: #fff;
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 14px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
  }
  #reader {
    width: 100%;
    border-radius: 8px;
    overflow: hidden;
  }
  #status {
    text-align: center;
    font-size: 14px;
    min-height: 20px;
    margin: 10px 0 4px;
    font-weight: 600;
  }
  .status-ok { color: #16a34a; }
  .status-err { color: #dc2626; }
  .status-busy { color: #d97706; }
  .hint {
    font-size: 13px;
    color: #666;
    text-align: center;
    margin-top: 6px;
  }
  .queue-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }
  .queue-header h2 {
    font-size: 15px;
    margin: 0;
    color: #333;
  }
  .queue-empty {
    color: #999;
    font-size: 13px;
    text-align: center;
    padding: 10px 0;
  }
  .queue-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 0;
    border-bottom: 1px solid #eee;
    font-size: 14px;
  }
  .queue-item:last-child { border-bottom: none; }
  .queue-item .chassis {
    font-weight: 600;
    word-break: break-all;
  }
  .queue-item .meta {
    font-size: 12px;
    color: #888;
  }
  .queue-item .removeBtn {
    background: none;
    border: none;
    color: #dc2626;
    font-size: 18px;
    font-weight: 700;
    padding: 0 6px;
    width: auto;
    margin: 0;
    line-height: 1;
  }
  .send-bar {
    position: fixed;
    left: 0;
    right: 0;
    bottom: 0;
    background: #fff;
    box-shadow: 0 -2px 8px rgba(0,0,0,0.1);
    padding: 10px 16px calc(10px + env(safe-area-inset-bottom));
  }
  .send-bar-inner {
    max-width: 480px;
    margin: 0 auto;
  }
  button {
    width: 100%;
    padding: 14px;
    font-size: 17px;
    font-weight: 700;
    border: none;
    border-radius: 10px;
  }
  #sendBtn {
    background: #16a34a;
    color: #fff;
  }
  #sendBtn:disabled {
    background: #9ca3af;
  }
</style>
</head>
<body>

<header>車両位置トラッカー</header>

<main>
  <div class="card">
    <div id="reader"></div>
    <div class="hint">車両のQRコードを次々にカメラへ写してください(自動で連続スキャンします)</div>
    <div id="status"></div>
  </div>

  <div class="card">
    <div class="queue-header">
      <h2>未送信一覧</h2>
      <span id="queueCount">0件</span>
    </div>
    <div id="queueList">
      <div class="queue-empty">まだスキャンしていません</div>
    </div>
  </div>
</main>

<div class="send-bar">
  <div class="send-bar-inner">
    <button id="sendBtn" disabled>送信(0件)</button>
  </div>
</div>

<script>
// ▼▼▼ Apps ScriptデプロイのウェブアプリURL(.../exec) ▼▼▼
const GAS_URL = "https://script.google.com/macros/s/AKfycbw7LZUcya2Ofq_DQd0yGYk2yGXQCCQ97gksCx5kVDcb3gUR1KUqnXgfWVJ3sL1xCL5f/exec";
// ▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲

// 端末ごとに自動採番されるID。ログイン不要のまま「どの端末が送信したか」を
// 区別するために使う(画面には表示しないが、送信データには含める)。
function getDeviceId() {
  const key = 'vehicleTrackerDeviceId';
  let id = localStorage.getItem(key);
  if (!id) {
    id = (crypto.randomUUID ? crypto.randomUUID() : (Date.now().toString(36) + Math.random().toString(36).slice(2)));
    localStorage.setItem(key, id);
  }
  return id;
}
const DEVICE_ID = getDeviceId();

let queue = []; // 未送信の {chassisNumber, lat, lng, accuracy, timestamp, deviceId}
let scanner = null;
let isScanning = false;
let isPaused = false;
let sending = false;

const statusEl = document.getElementById('status');
const queueListEl = document.getElementById('queueList');
const queueCountEl = document.getElementById('queueCount');
const sendBtn = document.getElementById('sendBtn');

function setStatus(msg, cls) {
  statusEl.textContent = msg;
  statusEl.className = cls || '';
}

function renderQueue() {
  queueCountEl.textContent = queue.length + '件';
  sendBtn.textContent = '送信(' + queue.length + '件)';
  sendBtn.disabled = queue.length === 0 || sending;

  if (queue.length === 0) {
    queueListEl.innerHTML = '<div class="queue-empty">まだスキャンしていません</div>';
    return;
  }

  queueListEl.innerHTML = '';
  queue.forEach((item, idx) => {
    const row = document.createElement('div');
    row.className = 'queue-item';

    const left = document.createElement('div');
    const chassisEl = document.createElement('div');
    chassisEl.className = 'chassis';
    chassisEl.textContent = item.chassisNumber;
    const metaEl = document.createElement('div');
    metaEl.className = 'meta';
    metaEl.textContent = new Date(item.timestamp).toLocaleTimeString('ja-JP') +
      ' / 精度' + Math.round(item.accuracy) + 'm';
    left.appendChild(chassisEl);
    left.appendChild(metaEl);

    const removeBtn = document.createElement('button');
    removeBtn.className = 'removeBtn';
    removeBtn.textContent = '×';
    removeBtn.addEventListener('click', () => {
      queue.splice(idx, 1);
      renderQueue();
    });

    row.appendChild(left);
    row.appendChild(removeBtn);
    queueListEl.appendChild(row);
  });
}

function startScanner() {
  if (isScanning) return;
  isScanning = true;
  setStatus('カメラを起動しています...', 'status-busy');

  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    isScanning = false;
    setStatus('このブラウザ/接続(HTTPS必須)ではカメラを使用できません', 'status-err');
    return;
  }

  scanner = new Html5Qrcode("reader");
  const config = { fps: 10, qrbox: { width: 250, height: 250 } };

  scanner.start(
    { facingMode: "environment" },
    config,
    onScanSuccess,
    () => {} // スキャン失敗(未検出)は無視して継続
  ).then(() => {
    setStatus('', '');
  }).catch((err) => {
    isScanning = false;
    setStatus('カメラを起動できません: ' + err, 'status-err');
  });
}

function onScanSuccess(decodedText) {
  // 同じQRコードを連写で何度も取り込まないよう、一時的にカメラを一時停止する
  if (isPaused) return;
  isPaused = true;
  if (scanner) {
    try { scanner.pause(true); } catch (e) {}
  }

  setStatus('GPS取得中...', 'status-busy');

  if (!navigator.geolocation) {
    setStatus('この端末はGPS取得に対応していません', 'status-err');
    resumeAfterDelay();
    return;
  }

  navigator.geolocation.getCurrentPosition(
    (pos) => {
      const now = new Date();
      queue.push({
        chassisNumber: decodedText,
        lat: pos.coords.latitude,
        lng: pos.coords.longitude,
        accuracy: pos.coords.accuracy,
        timestamp: now.toISOString(),
        deviceId: DEVICE_ID
      });
      renderQueue();
      setStatus('追加しました: ' + decodedText + '(現在 ' + queue.length + ' 件・未送信)', 'status-ok');
      resumeAfterDelay();
    },
    (err) => {
      setStatus('GPS取得エラー: ' + err.message, 'status-err');
      resumeAfterDelay();
    },
    { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 }
  );
}

function resumeAfterDelay() {
  // 次の車両にカメラを向ける時間を確保しつつ、タップ操作なしで自動再開する
  setTimeout(() => {
    isPaused = false;
    if (scanner) {
      try { scanner.resume(); } catch (e) {}
    }
  }, 1500);
}

sendBtn.addEventListener('click', () => {
  if (queue.length === 0 || sending) return;
  sending = true;
  sendBtn.disabled = true;
  const sentCount = queue.length;
  setStatus('送信中...(' + sentCount + '件)', 'status-busy');

  // GASのCORSプリフライトを回避するため text/plain で送信し、
  // サーバー側(doPost)でJSON.parseする
  fetch(GAS_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify({ items: queue })
  })
    .then((res) => res.json())
    .then((json) => {
      sending = false;
      if (json.status === 'ok') {
        setStatus('送信完了しました(' + sentCount + '件)', 'status-ok');
        queue = [];
        renderQueue();
      } else {
        setStatus('送信エラー: ' + json.message, 'status-err');
        renderQueue();
      }
    })
    .catch((err) => {
      sending = false;
      setStatus('通信エラー: ' + err, 'status-err');
      renderQueue();
    });
});

renderQueue();
window.addEventListener('load', startScanner);
</script>

</body>
</html>
